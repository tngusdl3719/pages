<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>드라마/영화 초성게임</title>
    <meta
      name="description"
      content="드라마와 영화 제목을 초성으로 맞히는 워크숍용 퀴즈 페이지입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./initial-quiz.js"></script>
  </head>
  <body class="page-quiz">
    <div class="page-shell">
      <div class="quiz-nav">
        <a class="button secondary nav-button" href="./index.html">메인으로</a>
      </div>

      <header class="marquee">
        <div class="marquee-copy">
          <p class="eyebrow">Workshop Edition</p>
          <h1 class="hero-title">
            <span class="title-line">드라마/영화</span>
            <span class="title-line">초성게임</span>
          </h1>
          <p class="intro">
            초성 힌트를 보고 제목을 먼저 맞혀보세요. 정답 보기 버튼을 누르면
            제목과 이미지가 함께 공개됩니다.
          </p>
        </div>

        <div class="scoreboard" aria-label="게임 현황">
          <article class="stat-card">
            <p class="stat-label">준비된 문제</p>
            <strong class="stat-value" id="total-count">0</strong>
          </article>
          <article class="stat-card">
            <p class="stat-label">현재 상태</p>
            <strong class="stat-value stat-small" id="game-status">대기 중</strong>
          </article>
          <article class="stat-card">
            <p class="stat-label">최종 정답 수</p>
            <strong class="stat-value" id="score-count">-</strong>
          </article>
        </div>
      </header>

      <main class="layout">
        <section class="game-board">
          <div class="section-head">
            <div>
              <p class="section-label">Initial Quiz</p>
              <h2 id="stage-title">시작 버튼을 눌러 첫 초성 문제를 뽑아보세요</h2>
            </div>
            <div class="status-pill" id="remaining-pill">문제 준비 완료</div>
          </div>

          <div class="screen-frame">
            <div class="screen-glow"></div>
            <div class="initial-stage" id="initial-stage">
              <p class="placeholder-ticket" id="initial-ticket">Initial Clue</p>
              <p class="initial-clue" id="initial-clue">ㄷㄹ / ㅇㅎ</p>
              <p class="initial-copy" id="initial-copy">
                시작 버튼을 누르면 초성 힌트가 여기에 나타납니다.
              </p>
            </div>
          </div>

          <p class="prompt" id="prompt" hidden></p>

          <div class="control-row">
            <button class="button primary" id="start-button" type="button">
              게임 시작
            </button>
            <button class="button secondary" id="answer-button" type="button" disabled>
              정답 보기
            </button>
            <button class="button tertiary" id="correct-button" type="button" disabled>
              정답
            </button>
            <button class="button tertiary" id="next-button" type="button" disabled>
              다른 문제
            </button>
          </div>

          <section class="answer-panel answer-panel-visual" id="answer-panel" aria-live="polite" data-state="idle" aria-hidden="true">
            <p class="answer-label" id="answer-label">정답 영역</p>
            <p class="answer-quote" id="answer-title">
              정답 보기 버튼을 누르면 이 영역에 제목과 이미지가 표시됩니다.
            </p>
            <p class="answer-movie" id="answer-meta"></p>
            <div class="answer-media">
              <img class="answer-image" id="answer-image" alt="" />
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
