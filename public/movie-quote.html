<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영화 명대사 맞추기</title>
    <meta
      name="description"
      content="회사 워크숍에서 쓰기 좋은 랜덤 영화 명대사 퀴즈 게임 페이지입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./movie-quote.css" />
    <script defer src="./app.js"></script>
  </head>
  <body class="page-quiz">
    <div class="page-shell">
      <div class="quiz-nav">
        <a class="button secondary nav-button" href="./index.html">메인으로</a>
        <a class="button secondary nav-button" href="./movie-quote-controller.html" target="_blank">컨트롤러 열기 ↗</a>
      </div>

      <header>
        <h1 class="eyebrow">전시개발팀 워크숍 영화 명대사 맞추기</h1>
        <span id="total-count" hidden></span>
        <span id="game-status" hidden></span>
        <span id="score-count" hidden></span>
      </header>

      <main class="layout">
        <section class="game-board">
          <div class="section-head">
            <div>
              <p class="section-label">Now Showing</p>
              <h2 id="stage-title">시작 버튼을 눌러 첫 문제를 시작하세요</h2>
            </div>
            <div class="status-pill" id="remaining-pill">문제 0 / 2</div>
          </div>

          <div class="screen-frame">
            <div class="screen-glow"></div>
            <img class="scene-image" id="scene-image" alt="" hidden />
            <iframe
              class="scene-video"
              id="scene-video"
              title=""
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
              hidden
            ></iframe>
            <div class="screen-placeholder" id="placeholder">
              <p class="placeholder-ticket" id="placeholder-ticket">Scene Cue</p>
              <p class="placeholder-title" id="placeholder-title">이 장면의 명대사를 맞혀보세요</p>
              <p class="placeholder-copy" id="placeholder-copy"></p>
            </div>
          </div>

          <p class="prompt" id="prompt"></p>

          <div class="control-row">
            <button class="button primary" id="start-button" type="button">
              게임 시작
            </button>
            <button class="button secondary" id="answer-button" type="button" disabled>
              정답 보기
            </button>
            <button class="button tertiary" id="correct-button" type="button" disabled>
              정답
            </button>
            <button class="button tertiary" id="next-button" type="button" disabled>
              다른 문제
            </button>
            <button class="button secondary" id="end-button" type="button" disabled>
              퀴즈 종료
            </button>
          </div>

          <section class="answer-panel answer-panel-compact" id="answer-panel" aria-live="polite" data-state="idle" aria-hidden="true">
            <p class="answer-label" id="answer-label"></p>
            <p class="answer-quote" id="answer-quote"></p>
            <p class="answer-movie" id="answer-movie"></p>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
