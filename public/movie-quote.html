<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영화 명대사 맞추기</title>
    <meta
      name="description"
      content="회사 워크숍에서 쓰기 좋은 랜덤 영화 명대사 퀴즈 게임 페이지입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body class="page-quiz">
    <div class="page-shell">
      <div class="quiz-nav">
        <a class="button secondary nav-button" href="./index.html">메인으로</a>
      </div>

      <header class="marquee">
        <div class="marquee-copy">
          <p class="eyebrow">Workshop Edition</p>
          <h1 class="hero-title">
            <span class="title-line">영화 명대사</span>
            <span class="title-line">맞추기</span>
          </h1>
          <p class="intro">
            시작 버튼을 누르면 준비된 문제 중 하나가 랜덤으로 등장합니다.
            장면 이미지를 보고 영화 명대사를 맞혀보세요.
          </p>
        </div>

        <div class="scoreboard" aria-label="게임 현황">
          <article class="stat-card">
            <p class="stat-label">준비된 문제</p>
            <strong class="stat-value" id="total-count">0</strong>
          </article>
          <article class="stat-card">
            <p class="stat-label">현재 상태</p>
            <strong class="stat-value stat-small" id="game-status">대기 중</strong>
          </article>
          <article class="stat-card">
            <p class="stat-label">진행 방식</p>
            <strong class="stat-value stat-small">중복 없이 랜덤</strong>
          </article>
        </div>
      </header>

      <main class="layout">
        <section class="game-board">
          <div class="section-head">
            <div>
              <p class="section-label">Now Showing</p>
              <h2 id="stage-title">시작 버튼을 눌러 첫 문제를 뽑아보세요</h2>
            </div>
            <div class="status-pill" id="remaining-pill">문제 준비 완료</div>
          </div>

          <div class="screen-frame">
            <div class="screen-glow"></div>
            <img class="scene-image" id="scene-image" alt="" hidden />
            <div class="screen-placeholder" id="placeholder">
              <p class="placeholder-ticket" id="placeholder-ticket">Scene Cue</p>
              <p class="placeholder-title" id="placeholder-title">이 장면의 명대사를 맞혀보세요</p>
              <p class="placeholder-copy" id="placeholder-copy">
                퀴즈가 시작되면 장면 이미지 한 장이 이 스크린에 나타납니다.
              </p>
            </div>
          </div>

          <p class="prompt" id="prompt">
            랜덤 장면이 준비되면 아래에서 정답을 확인할 수 있습니다.
          </p>

          <div class="control-row">
            <button class="button primary" id="start-button" type="button">
              게임 시작
            </button>
            <button class="button secondary" id="answer-button" type="button" disabled>
              정답 보기
            </button>
            <button class="button tertiary" id="next-button" type="button" disabled>
              다른 문제
            </button>
          </div>

          <section class="answer-panel" id="answer-panel" hidden aria-live="polite">
            <p class="answer-label">정답 공개</p>
            <p class="answer-quote" id="answer-quote"></p>
            <p class="answer-movie" id="answer-movie"></p>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
