<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퀴즈 컨트롤러</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .ctrl-shell {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        padding: 1.5rem 1rem 2rem;
        max-width: 480px;
        margin: 0 auto;
      }

      .ctrl-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .ctrl-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
        margin: 0;
      }

      .conn-badge {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        white-space: nowrap;
      }

      .conn-badge[data-state="waiting"] {
        background: color-mix(in srgb, var(--muted) 20%, transparent);
        color: var(--muted);
      }

      .conn-badge[data-state="connected"] {
        background: color-mix(in srgb, #4ade80 20%, transparent);
        color: #16a34a;
      }

      .ctrl-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
      }

      .ctrl-buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .ctrl-buttons .button {
        width: 100%;
        padding: 1rem;
        font-size: 1.05rem;
      }

      /* 문제 선택 리스트 */
      .quiz-list-section {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .quiz-list-heading {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0;
      }

      .quiz-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .quiz-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 0.875rem;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        transition: border-color 180ms ease, background 180ms ease;
      }

      .quiz-item--active {
        border-color: var(--accent-strong);
        background: color-mix(in srgb, var(--accent-strong) 8%, var(--surface));
      }

      .quiz-item-num {
        flex-shrink: 0;
        width: 1.5rem;
        height: 1.5rem;
        border-radius: 50%;
        background: color-mix(in srgb, var(--muted) 15%, transparent);
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .quiz-item--active .quiz-item-num {
        background: var(--accent-strong);
        color: #fff;
      }

      .quiz-item-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }

      .quiz-item-movie {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .quiz-item-quote {
        font-size: 0.8rem;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .quiz-item-select {
        flex-shrink: 0;
        padding: 0.35rem 0.75rem;
        font-size: 0.8rem;
      }

      .quiz-list-empty {
        font-size: 0.85rem;
        color: var(--muted);
        text-align: center;
        padding: 1rem 0;
      }

      .ctrl-nav {
        margin-top: auto;
      }
    </style>
  </head>
  <body class="page-quiz">
    <div class="ctrl-shell">
      <header class="ctrl-header">
        <h1 class="ctrl-title">퀴즈 컨트롤러</h1>
        <span class="conn-badge" id="conn-badge" data-state="waiting">대기 중</span>
      </header>

      <div class="ctrl-stats scoreboard" aria-label="게임 현황">
        <article class="stat-card">
          <p class="stat-label">현재 상태</p>
          <strong class="stat-value stat-small" id="ctrl-status">대기 중</strong>
        </article>
        <article class="stat-card">
          <p class="stat-label">문제</p>
          <strong class="stat-value" id="ctrl-round">-</strong>
        </article>
        <article class="stat-card">
          <p class="stat-label">정답</p>
          <strong class="stat-value" id="ctrl-score">-</strong>
        </article>
      </div>

      <div class="ctrl-buttons">
        <button class="button primary" id="ctrl-start" type="button">게임 시작</button>
        <button class="button secondary" id="ctrl-answer" type="button" disabled>정답 보기</button>
        <button class="button tertiary" id="ctrl-correct" type="button" disabled>정답</button>
        <button class="button tertiary" id="ctrl-next" type="button" disabled>다른 문제</button>
        <button class="button secondary" id="ctrl-end" type="button" disabled>퀴즈 종료</button>
      </div>

      <section class="quiz-list-section" aria-label="문제 선택">
        <h2 class="quiz-list-heading">문제 선택</h2>
        <ul class="quiz-list" id="quiz-list">
          <li class="quiz-list-empty" id="quiz-list-empty">디스플레이 페이지와 연결되면 문제 목록이 나타납니다</li>
        </ul>
      </section>

      <nav class="ctrl-nav">
        <a class="button secondary nav-button" href="./movie-quote.html" target="_blank">디스플레이 열기 ↗</a>
      </nav>
    </div>

    <script>
      const channel = new BroadcastChannel("movie-quiz-ctrl");

      const connBadge = document.querySelector("#conn-badge");
      const ctrlStatus = document.querySelector("#ctrl-status");
      const ctrlRound = document.querySelector("#ctrl-round");
      const ctrlScore = document.querySelector("#ctrl-score");
      const ctrlStart = document.querySelector("#ctrl-start");
      const ctrlAnswer = document.querySelector("#ctrl-answer");
      const ctrlCorrect = document.querySelector("#ctrl-correct");
      const ctrlNext = document.querySelector("#ctrl-next");
      const ctrlEnd = document.querySelector("#ctrl-end");
      const quizList = document.querySelector("#quiz-list");
      const quizListEmpty = document.querySelector("#quiz-list-empty");

      function send(action, extra = {}) {
        channel.postMessage({ type: "cmd", action, ...extra });
      }

      function renderQuizList(list, currentIndex) {
        quizList.innerHTML = "";

        if (!list || list.length === 0) {
          quizList.appendChild(quizListEmpty);
          return;
        }

        list.forEach(({ index, movie, quote }) => {
          const isCurrent = index === currentIndex;
          const li = document.createElement("li");
          li.className = "quiz-item" + (isCurrent ? " quiz-item--active" : "");
          li.setAttribute("aria-current", isCurrent ? "true" : "false");

          const numEl = document.createElement("span");
          numEl.className = "quiz-item-num";
          numEl.textContent = String(index + 1);

          const infoEl = document.createElement("div");
          infoEl.className = "quiz-item-info";
          infoEl.innerHTML = `
            <span class="quiz-item-movie">${movie}</span>
            <span class="quiz-item-quote">"${quote}"</span>
          `;

          const btn = document.createElement("button");
          btn.className = "button secondary quiz-item-select";
          btn.type = "button";
          btn.textContent = isCurrent ? "진행 중" : "선택";
          btn.disabled = isCurrent;
          btn.addEventListener("click", () => send("selectQuiz", { index }));

          li.append(numEl, infoEl, btn);
          quizList.appendChild(li);
        });
      }

      function applyState(data) {
        connBadge.dataset.state = "connected";
        connBadge.textContent = "연결됨";

        ctrlStatus.textContent = data.gameStatus;
        ctrlRound.textContent = data.round > 0 ? `${data.round} / ${data.totalCount}` : "-";
        ctrlScore.textContent = data.score > 0 || data.gameStatus === "종료" ? `${data.score}개` : "-";

        ctrlStart.textContent = data.startLabel;
        ctrlAnswer.disabled = !data.buttons.answer;
        ctrlCorrect.disabled = !data.buttons.correct;
        ctrlNext.disabled = !data.buttons.next;
        ctrlEnd.disabled = !data.buttons.end;

        if (data.quizList) {
          renderQuizList(data.quizList, data.currentIndex ?? -1);
        }
      }

      channel.onmessage = ({ data: msg }) => {
        if (msg.type === "state") {
          applyState(msg.data);
        }
      };

      ctrlStart.addEventListener("click", () => send("start"));
      ctrlAnswer.addEventListener("click", () => send("revealAnswer"));
      ctrlCorrect.addEventListener("click", () => send("correct"));
      ctrlNext.addEventListener("click", () => send("next"));
      ctrlEnd.addEventListener("click", () => send("end"));

      // 페이지 로드 시 디스플레이에 현재 상태 요청
      channel.postMessage({ type: "requestState" });
    </script>
  </body>
</html>
